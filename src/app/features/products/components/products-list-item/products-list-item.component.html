<img
  [ngSrc]="product().images[0]"
  width="275"
  height="275"
  [alt]="product().title"
  class="rounded-md w-full bg-neutral-100"
/>

<a
  [routerLink]="['products', product().id]"
  class="before:absolute before:inset-0 block"
>
  <h2 class="text-lg font-semibold line-clamp-1">{{ product().title }}</h2>
</a>

<div class="flex gap-4 justify-between items-center">
  <div class="flex flex-col">
    <small
      class="font-semibold line-through text-sm text-neutral-500 leading-none"
    >
      {{ product().price * 1.3 | currency }}
    </small>

    <span class="text-lg font-semibold">
      {{ product().price | currency }}
    </span>
  </div>

  <button
    type="button"
    class="px-3.5 py-1.5 bg-black text-white rounded-md hover:bg-black/90 z-10"
    (click)="addToCart.emit(product().id)"
  >
    Add to cart
  </button>
</div>
